[package]
name = "adventure"
version = "0.1.0"
edition = "2024"

[features]
default = ["fast"]
debug_toolkit = [
    "dep:bevy-inspector-egui",
    "dep:bevy_egui",
]
# Faster incremental compiles via dynamic linking of Bevy. Dev-only — never ship.
fast = ["bevy/dynamic_linking"]

[dependencies]
bevy = { version = "0.18", features = ["bevy_remote"] }
bevy_brp_extras = "0.18"
bevy_rapier3d = "0.34.0"
wgpu = "27"
bevy-inspector-egui = { version = "0.36", optional = true }
bevy_egui = { version = "0.39", optional = true }
# PBR texture-library loading: decode PNG maps (image) and read material manifests (ron).
image = { version = "0.25", default-features = false, features = ["png"] }
ron = "0.12"
serde = { version = "1", features = ["derive"] }
# Offline BC7 encode of the PBR texture arrays (cached to disk; ~1/6 the VRAM).
intel_tex_2 = "0.2"

[dev-dependencies]
naga = "27"
# Composes #import-based WGSL modules so the shader-validation test can resolve the
# split sdf shader the same way Bevy's ShaderCache does at runtime.
naga_oil = "0.20"

[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 3
